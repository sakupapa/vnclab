<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KNCLAB</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
    }

    .banner {
      width: min(90%, 900px);
      padding: 42px 28px;
      text-align: center;
      color: #fff;
      background: linear-gradient(135deg, #0066cc, #00a6a6);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgb(0 72 140 / 25%);
    }

    .banner h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <main class="banner">
    <h1>WELCOME to KNCLAB!</h1>
  </main>
</body>
</html>
