name: vnc-lab

topology:
  nodes:
    vnc1:
      kind: linux
      image: vnc-desktop:bookworm
      image-pull-policy: Never
      ports:
        - 5900:5900/tcp
      env:
        VNC_PASSWORD: "cisco123"
        VNC_GEOMETRY: "1440x900"
        VNC_DEPTH: "24"
      exec:
        - ip link set eth1 up
        - ip addr add 10.100.0.1/24 dev eth1

    nginx:
      kind: linux
      image: nginx:1.0
      exec:
        - ip link set eth1 up
        - ip addr add 10.100.0.2/24 dev eth1

  links:
    - endpoints: ["vnc1:eth1", "nginx:eth1"]
