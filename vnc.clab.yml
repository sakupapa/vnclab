name: vnc

topology:
  nodes:
    vnc:
      kind: linux
      image: vnc-desktop:bookworm
      image-pull-policy: Never
      ports:
        - 5900:5900/tcp
      env:
        VNC_PASSWORD: "cisco123"
        VNC_GEOMETRY: "1440x900"
        VNC_DEPTH: "24"
      exec:
        - ip link set eth1 up
        - dhclient eth1
        - ip route add 1.0.0.0/24 via 192.168.1.254
        - ip route add 100.0.0.0/8 via 192.168.1.254 
    nginx:
      kind: linux
      image: nginx:1.0
      exec:
        - ip link set eth1 up
        - ip addr add 1.0.0.1/24 dev eth1
        - ip route add 100.0.0.0/8 via 1.0.0.254
    dns:
      kind: linux
      image: coredns:1.0
      binds:
        - ./Corefile:/etc/coredns/Corefile:ro
      ports:
        - "5301:53/udp"
        - "5302:53/tcp"
      exec:
        - ip link set eth1 up
        - ip addr add 100.0.0.1/24 dev eth1
        - ip route add 100.0.0.0/8 via 100.0.0.254
    home:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: clab-vnc-home-startup.cfg.partial
    pe1:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: clab-vnc-pe1-startup.cfg.partial
    p:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: clab-vnc-p-startup.cfg.partial
    pe2:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: clab-vnc-pe2-startup.cfg.partial
    ix:
      kind: cisco_iol
      image: vrnetlab/cisco_iol:17.16.01a
      startup-config: clab-vnc-ix-startup.cfg.partial

  links:
    - endpoints: ["vnc:eth1", "home:Ethernet0/1"]
    - endpoints: ["home:Ethernet0/2", "pe1:Ethernet0/1"]
    - endpoints: ["pe1:Ethernet0/2", "p:Ethernet0/1"]
    - endpoints: ["p:Ethernet0/2", "pe2:Ethernet0/1"]
    - endpoints: ["pe2:Ethernet0/2", "ix:Ethernet0/1"]
    - endpoints: ["ix:Ethernet0/2", "nginx:eth1"]
    - endpoints: ["ix:Ethernet0/3", "dns:eth1"]
